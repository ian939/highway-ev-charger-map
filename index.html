<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>고속도로 휴게소 전기차충전소 현황 지도</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: "Malgun Gothic", "Noto Sans KR", sans-serif; }
  #app { display: flex; height: 100vh; }
  #sidebar {
    width: 320px; flex: 0 0 320px; height: 100%; overflow-y: auto;
    background: #1b2230; color: #e8edf4; padding: 16px 16px 40px;
  }
  #map { flex: 1 1 auto; height: 100%; }
  h1 { font-size: 16px; margin: 0 0 4px; }
  .sub { font-size: 11px; color: #8b97a8; margin-bottom: 14px; }
  .stat { background: #2a3344; border-radius: 8px; padding: 10px 12px; margin-bottom: 14px; }
  .stat .row { display: flex; justify-content: space-between; font-size: 13px; padding: 2px 0; }
  .stat b { color: #4fd1c5; font-size: 16px; }
  .grp { margin-bottom: 12px; }
  .grp-title { font-size: 12px; color: #9fb0c6; margin: 10px 0 6px; font-weight: 700; letter-spacing: .3px; }
  .btns { display: flex; flex-wrap: wrap; gap: 6px; }
  .op {
    font-size: 12px; padding: 5px 9px; border-radius: 14px; cursor: pointer;
    border: 1px solid #3a465c; background: #2a3344; color: #aeb9c9; user-select: none;
    transition: all .12s;
  }
  .op.on { background: #4fd1c5; border-color: #4fd1c5; color: #0f1620; font-weight: 700; }
  .op .cnt { opacity: .7; font-weight: 400; margin-left: 3px; }
  .op .sw { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
  .op .gear { margin-left: 5px; opacity: .55; font-size: 11px; cursor: pointer; }
  .op .gear:hover { opacity: 1; }
  #op-settings {
    position: fixed; z-index: 50; width: 220px; background: #2a3344; color: #e8edf4;
    border: 1px solid #3f4d66; border-radius: 8px; padding: 12px; box-shadow: 0 8px 24px rgba(0,0,0,.4);
    font-size: 12px;
  }
  #op-settings .os-title { font-weight: 700; margin-bottom: 10px; color: #4fd1c5; font-size: 13px; }
  #op-settings label { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 9px; }
  #op-settings input[type=color] { width: 46px; height: 26px; border: none; background: none; padding: 0; cursor: pointer; }
  #op-settings select { flex: 1; background: #344056; color: #e8edf4; border: 1px solid #3f4d66; border-radius: 5px; padding: 4px; }
  #op-settings input[type=range] { flex: 1; }
  #op-settings .os-foot { display: flex; gap: 6px; margin-top: 4px; }
  #op-settings .os-foot button { flex: 1; padding: 6px; border-radius: 5px; border: 1px solid #3f4d66; background: #344056; color: #e8edf4; cursor: pointer; }
  #op-settings .os-foot button:hover { background: #3f4d66; }
  .iw-sw { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
  .dup-badge { display: inline-block; min-width: 16px; height: 16px; line-height: 16px; padding: 0 4px; border-radius: 8px; background: #e23b3b; color: #fff; font-size: 11px; font-weight: 700; text-align: center; vertical-align: middle; margin-left: 4px; }
  .cnt-chip { display: inline-block; height: 18px; line-height: 18px; padding: 0 7px; border-radius: 9px; color: #fff; font-size: 11px; font-weight: 700; vertical-align: middle; margin-left: 6px; }
  .iw .dup-item { border-top: 1px dashed #d2d2d2; padding-top: 8px; margin-top: 8px; }

  .iw .dup-sub { font-weight: 400; color: #778; font-size: 11px; margin-left: 6px; }
  .iw .dup-tot { display: flex; justify-content: space-between; color: #2f9e8f; font-weight: 700; font-size: 12px; margin-top: 4px; }

  #upload-status { font-size: 11px; color: #9fb0c6; margin-top: 8px; line-height: 1.5; white-space: pre-line; }
  #upload-status.err { color: #f0ad4e; }
  .legend { font-size: 11px; color: #8b97a8; margin-top: 16px; line-height: 1.7; }

</head>

<div id="app">
  <div id="sidebar">
    <h1>고속도로 휴게소 전기차충전소 현황</h1>

    <div class="stat">

      <div class="row"><span>중복 지점 (2+사업자)</span><b id="stat-dup">0곳</b></div>
    </div>
    <div class="toolbar">
      <button id="all-on">전체 선택</button>
      <button id="all-off">전체 해제</button>
    </div>
    <div class="upload">
      <div class="grp-title">CSV로 휴게소 추가</div>
      <div class="upload-btns">
        <button id="sample-dl">① 샘플 양식 다운로드</button>
        <label class="up-label">② CSV 업로드<input id="csv-file" type="file" accept=".csv" hidden></label>
      </div>
      <div id="upload-status"></div>
    </div>
    <div class="grp" id="count-filter">
      <div class="grp-title">사업자 수(중복) 필터</div>
      <div class="btns" id="count-btns"></div>
    </div>
    <div id="filters"></div>
    <div class="legend">
      <div>마커 색 = 대표 사업자(켜진 것 중 충전기 최다), 버튼 색과 동일</div>
      <div><span class="dot" style="width:8px;height:8px;"></span>마커 크기 = 휴게소 총 충전기 수 (사업자 ⚙로 색·모양·크기 조절)</div>
      <div>원 안 숫자 = 그 지점 사업자 수, <b style="color:#e2231a">SK</b> 태그=SK일렉링크 포함</div>
      <div><span class="approx" style="margin:0;">근사</span> 건설중·미확정 부지(점선 테두리, 읍·면 단위 근사 위치)</div>
    </div>
  </div>
  <div id="map"></div>
</div>

<div id="op-settings" hidden>
  <div class="os-title"></div>
  <label>색상 <input type="color" id="os-color"></label>
  <label>모양
    <select id="os-shape">
      <option value="circle">● 원</option>
      <option value="square">■ 사각형</option>
      <option value="triangle">▲ 삼각형</option>
      <option value="diamond">◆ 다이아몬드</option>
      <option value="star">★ 별</option>
    </select>
  </label>
  <label>크기 <span id="os-size-val"></span><input type="range" id="os-size" min="0.5" max="2.5" step="0.1"></label>
  <div class="os-foot">
    <button id="os-reset">기본값</button>
    <button id="os-close">닫기</button>
  </div>
</div>

    offset: new kakao.maps.Point(c, c),
  });
  _imgCache[key] = img;
  return img;
}
// 켜진 사업자 중 충전기 수가 가장 많은 대표 사업자 (항목들 전체에서)
function dominantOpOf(items) {
  let best = null, bestN = -1;
  items.forEach(it => {
    for (const [op, n] of Object.entries(it.operators)) {
      if (active.has(op) && n > bestN) { bestN = n; best = op; }
    }
  });
  return best;
}
const isSKEL = op => op.includes("SK일렉링크");
// 지점의 보이는 사업자 집합 정보: 개수 + SK일렉링크 포함 여부
function nodeOpInfo(visItems) {
  const s = new Set();
  visItems.forEach(it => Object.keys(it.operators).forEach(op => { if (active.has(op)) s.add(op); }));
  return { count: s.size, hasSK: [...s].some(isSKEL) };
}
// 지점(node)의 보이는 항목들 기준 마커 이미지: 대표 사업자 스타일 + 사업자 수 배지
function nodeMarkerImage(node, visItems) {
  const op = dominantOpOf(visItems);
  const color = op ? COLORS[op] : "#9aa6b5";
  const total = visItems.reduce((s, it) => s + it.total, 0);
  const approx = visItems.some(it => it.approx);
  const { count, hasSK } = nodeOpInfo(visItems);
  const centerText = count >= 1 ? "" + count : "";
  return markerImage(total, color, op ? shapeOf(op) : "circle", op ? scaleOf(op) : 1, approx, centerText, hasSK);
}

function makeOpButton(op) {
  const el = document.createElement("div");
  el.className = active.has(op) ? "op on" : "op";
  el.dataset.op = op;
  el.innerHTML = `<span class="sw"></span>${op}<span class="cnt">${OP_STOPCOUNT[op] || 0}</span><span class="gear" title="마커 설정">⚙</span>`;
  el.onclick = (e) => {
    if (e.target.classList.contains("gear")) { e.stopPropagation(); openSettings(op, el); return; }
    if (active.has(op)) { active.delete(op); el.classList.remove("on"); }
    else { active.add(op); el.classList.add("on"); }
    paintButton(el);
    refresh();
  };
  paintButton(el);
  return el;
}
function getOrCreateGroup(title) {
  let grp = [...document.querySelectorAll("#filters .grp")].find(g => g.dataset.title === title);
  if (!grp) {
    grp = document.createElement("div");
    grp.className = "grp";
    grp.dataset.title = title;
    grp.innerHTML = `<div class="grp-title">${title}</div>`;
    const btns = document.createElement("div");
    btns.className = "btns";
    grp.appendChild(btns);
    document.getElementById("filters").appendChild(grp);
  }
  return grp.querySelector(".btns");
}
function buildFilters() {
  CATEGORIES.forEach(cat => {
    const btns = getOrCreateGroup(cat.title);
    cat.ops.forEach(op => btns.appendChild(makeOpButton(op)));
  });
}
// 사업자 수(1/2/3/4개 이상) 필터 버튼
function buildCountFilters() {
  const root = document.getElementById("count-btns");
  [[1, "1개"], [2, "2개"], [3, "3개"], [4, "4개 이상"]].forEach(([v, label]) => {
    const el = document.createElement("div");
    el.className = "op cbtn" + (activeCounts.has(v) ? " on" : "");
    el.dataset.cnt = v;
    el.textContent = label;
    el.onclick = () => {
      if (activeCounts.has(v)) { activeCounts.delete(v); el.classList.remove("on"); }
      else { activeCounts.add(v); el.classList.add("on"); }
      refresh();
    };
    root.appendChild(el);
  });
}

// 새 사업자(헤더에 없던 컬럼) → 색상·필터 버튼 자동 등록
function hslToHex(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
  const hx = x => Math.round(255 * x).toString(16).padStart(2, "0");
  return "#" + hx(f(0)) + hx(f(8)) + hx(f(4));
}
let _extraColorIdx = 0;
function nextColor() {
  const hue = (_extraColorIdx * 137.508) % 360;  // 황금각: 색 최대 분산
  _extraColorIdx++;
  return hslToHex(hue, 68, 45);
}
function registerOperator(op) {
  if (op in COLORS) return false;   // 기존 사업자는 건드리지 않음
  COLORS[op] = nextColor();
  OP_STOPCOUNT[op] = 0;
  active.add(op);
  getOrCreateGroup("추가 사업자").appendChild(makeOpButton(op));
  return true;
}
function paintButton(el) {
  const color = COLORS[el.dataset.op] || "#4fd1c5";
  const sw = el.querySelector(".sw");
  if (sw) sw.style.background = color;
  if (active.has(el.dataset.op)) {
    el.style.background = color;
    el.style.borderColor = color;
    el.style.color = textColorOn(color);
    if (sw) sw.style.boxShadow = "0 0 0 1.5px rgba(255,255,255,.7)";
  } else {
    el.style.background = "#2a3344";
    el.style.borderColor = "#3a465c";
    el.style.color = "#aeb9c9";
    if (sw) sw.style.boxShadow = "none";
  }
}
function syncButtons() {
  document.querySelectorAll(".op").forEach(el => {
    el.classList.toggle("on", active.has(el.dataset.op));
    paintButton(el);
  });
}

// ===== 사업자별 마커 설정(색·모양·크기) 팝오버 =====
let _settingsOp = null;
function openSettings(op, anchor) {
  _settingsOp = op;
  const p = document.getElementById("op-settings");
  p.querySelector(".os-title").textContent = `${op} · 마커 설정`;
  document.getElementById("os-color").value = COLORS[op] || "#4fd1c5";
  document.getElementById("os-shape").value = shapeOf(op);
  const size = document.getElementById("os-size");
  size.value = scaleOf(op);
  document.getElementById("os-size-val").textContent = (+size.value).toFixed(1) + "x";
  p.hidden = false;
  const rect = anchor.getBoundingClientRect();
  const pw = p.offsetWidth, ph = p.offsetHeight;
  p.style.left = Math.min(rect.left, window.innerWidth - pw - 8) + "px";
  p.style.top = Math.min(rect.bottom + 6, window.innerHeight - ph - 8) + "px";
}
function closeSettings() {
  document.getElementById("op-settings").hidden = true;
  _settingsOp = null;
}
function applyOpStyle() {
  const el = [...document.querySelectorAll(".op")].find(x => x.dataset.op === _settingsOp);
  if (el) paintButton(el);   // 버튼 색 점도 갱신
  refresh();                 // 마커 다시 그림
}
function wireSettings() {
  document.getElementById("os-color").oninput = e => { COLORS[_settingsOp] = e.target.value; applyOpStyle(); };
  document.getElementById("os-shape").onchange = e => { SHAPES[_settingsOp] = e.target.value; applyOpStyle(); };
  document.getElementById("os-size").oninput = e => {
    SCALES[_settingsOp] = +e.target.value;
    document.getElementById("os-size-val").textContent = (+e.target.value).toFixed(1) + "x";
    applyOpStyle();
  };
  document.getElementById("os-reset").onclick = () => {
    COLORS[_settingsOp] = DEFAULT_COLORS[_settingsOp] || COLORS[_settingsOp];
    delete SHAPES[_settingsOp]; delete SCALES[_settingsOp];
    openSettings(_settingsOp, [...document.querySelectorAll(".op")].find(x => x.dataset.op === _settingsOp));
    applyOpStyle();
  };
  document.getElementById("os-close").onclick = closeSettings;
  // 바깥 클릭 시 닫기
  document.addEventListener("mousedown", e => {
    const p = document.getElementById("op-settings");
    if (p.hidden) return;
    if (!p.contains(e.target) && !e.target.classList.contains("gear")) closeSettings();
  });
}

function opRows(operators) {
  return Object.entries(operators)
    .map(([k, v]) => `<tr><td><span class="iw-sw" style="background:${COLORS[k]||'#999'}"></span>${k}</td><td class="n">${v}</td></tr>`).join("");
}
function countChip(operators) {
  const ops = Object.keys(operators);
  if (ops.length < 2) return "";
  const sk = ops.some(isSKEL);
  return `<span class="cnt-chip" style="background:${sk ? '#e2231a' : '#475569'}">중복 ${sk ? "SK" : ""}${ops.length}</span>`;
}
function iwContent(d) {
  const approx = d.approx ? '<span class="approx">근사</span>' : "";
  return `<div class="iw"><h3>${d.name}${approx}${countChip(d.operators)}</h3>` +
    `<div class="meta">${d.type || ""} · ${d.route || ""}<br>${d.address || ""}</div>` +
    `<table>${opRows(d.operators)}</table>` +
    `<div class="tot"><span>합계</span><span>${d.total}대</span></div></div>`;
}
// 중복 지점 합본 팝업: 같은 좌표의 여러 휴게소를 모두 나열 + 전체 합계
function nodePopup(node, visItems) {
  if (visItems.length === 1) return iwContent(visItems[0]);
  const marks = "①②③④⑤⑥⑦⑧⑨".split("");
  const sum = visItems.reduce((s, it) => s + it.total, 0);
  const blocks = visItems.map((it, i) => {
    const approx = it.approx ? '<span class="approx">근사</span>' : "";
    return `<div class="dup-item"><div class="dup-name">${marks[i] || (i+1)+"."} ${it.name}${approx}` +
      `<span class="dup-sub">${it.type || ""} · ${it.route || ""}</span></div>` +
      `<table>${opRows(it.operators)}</table>` +
      `<div class="dup-tot"><span>소계</span><span>${it.total}대</span></div></div>`;
  }).join("");
  return `<div class="iw"><h3>중복 지점 · ${visItems.length}곳 <span class="dup-badge">${visItems.length}</span></h3>` +
    `<div class="meta">${visItems[0].address || ""}</div>` +
    blocks +
    `<div class="tot"><span>전체 합계</span><span>${sum}대</span></div></div>`;
}

function refresh() {
  let visibleStops = 0;
  let chargerSum = 0;
  nodes.forEach(node => {
    let visItems = node.items.filter(it => Object.keys(it.operators).some(op => active.has(op)));
    // 사업자 수 필터: 지점의 사업자 수 버킷(4=4+)이 선택돼 있어야 표시
    if (visItems.length) {
      const bucket = Math.min(nodeOpInfo(visItems).count, 4);
      if (!activeCounts.has(bucket)) visItems = [];
    }
    if (visItems.length) {
      node.marker.setImage(nodeMarkerImage(node, visItems));
      node.marker.setMap(map);
      node._visItems = visItems;     // 클릭 팝업에서 사용
      visibleStops += visItems.length;
      visItems.forEach(it => Object.keys(it.operators).forEach(op => { if (active.has(op)) chargerSum += it.operators[op]; }));
    } else {
      node._visItems = [];
      node.marker.setMap(null);
    }
  });
  document.getElementById("stat-stops").textContent = visibleStops;
  document.getElementById("stat-chargers").textContent = chargerSum.toLocaleString() + "대";
  const dupEl = document.getElementById("stat-dup");
  if (dupEl) {
    const dup = nodes.filter(n => (n._visItems || []).length && nodeOpInfo(n._visItems).count >= 2).length;
    dupEl.textContent = dup + "곳";
  }
}

// ===== CSV 업로드 =====
const OPERATOR_LABELS = CATEGORIES.flatMap(c => c.ops);  // 17개 운영사 (엑셀 순서)
const BASE_FIELDS = ["휴게소명", "시설구분", "노선명", "주소"];
const CSV_HEADER = [...BASE_FIELDS, ...OPERATOR_LABELS];

function downloadSample() {
  const example = [
    "예시휴게소(서울)", "휴게소", "경부선", "서울특별시 서초구 경부고속도로 100",
    "2", "", "", "", "", "", "4", "", "", "3", "", "", "", "5", "", "", "1",
  ];
  const rows = [CSV_HEADER, example];
  const csv = rows.map(r => r.map(c => /[",\n]/.test(c) ? `"${c.replace(/"/g, '""')}"` : c).join(",")).join("\r\n");
  const blob = new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8" });  // BOM: 엑셀 한글
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "휴게소_충전소_추가양식.csv";
  a.click();
  URL.revokeObjectURL(a.href);
}

function parseCSV(text) {
  text = text.replace(/^﻿/, "");
  const rows = []; let row = [], cur = "", q = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (q) {
      if (c === '"') { if (text[i + 1] === '"') { cur += '"'; i++; } else q = false; }
      else cur += c;
    } else {
      if (c === '"') q = true;
      else if (c === ",") { row.push(cur); cur = ""; }
      else if (c === "\n") { row.push(cur); rows.push(row); row = []; cur = ""; }
      else if (c === "\r") { /* skip */ }
      else cur += c;
    }
  }
  if (cur !== "" || row.length) { row.push(cur); rows.push(row); }
  return rows.filter(r => r.some(c => c.trim() !== ""));
}

// 클라이언트 지오코딩: 휴게소명 키워드검색 → 실패 시 주소검색
const placesSvc = () => new kakao.maps.services.Places();
const geocoderSvc = () => new kakao.maps.services.Geocoder();
function geocodeClient(name, address) {
  return new Promise(resolve => {
    const base = String(name).split(/[(\s]/)[0];
    placesSvc().keywordSearch(base + "휴게소", (data, status) => {
      if (status === kakao.maps.services.Status.OK && data.length) {
        const rest = data.find(d => (d.category_name || "").includes("고속도로휴게소")) || data[0];
        return resolve({ lat: +rest.y, lng: +rest.x });
      }
      geocoderSvc().addressSearch(String(address || ""), (res, st2) => {
        if (st2 === kakao.maps.services.Status.OK && res.length) {
          return resolve({ lat: +res[0].y, lng: +res[0].x });
        }
        resolve(null);
      });
    });
  });
}

function updateCounts() {
  for (const op in OP_STOPCOUNT) OP_STOPCOUNT[op] = 0;
  ITEMS.forEach(it => Object.keys(it.operators).forEach(op => {
    if (op in OP_STOPCOUNT) OP_STOPCOUNT[op]++;
  }));
  document.querySelectorAll(".op").forEach(el => {
    const c = el.querySelector(".cnt");
    if (c) c.textContent = OP_STOPCOUNT[el.dataset.op] || 0;
  });
}

// 항목을 같은 좌표 지점(node)에 묶어 마커 1개로 관리 (중복 지점 처리)
function addItem(d) {
  ITEMS.push(d);
  const key = nodeKey(d.lat, d.lng);
  let node = nodeIndex[key];
  if (!node) {
    node = { items: [], lat: d.lat, lng: d.lng, marker: null };
    nodeIndex[key] = node;
    nodes.push(node);
    node.marker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(d.lat, d.lng), title: d.name });
    kakao.maps.event.addListener(node.marker, "click", () => {
      infowindow.setContent(nodePopup(node, node._visItems || node.items));
      infowindow.open(map, node.marker);
    });
  }
  node.items.push(d);
  return node;
}

async function handleUpload(file) {
  const status = document.getElementById("upload-status");
  status.className = "";
  status.textContent = "파일 읽는 중…";
  const text = await file.text();
  const rows = parseCSV(text);
  if (rows.length < 2) { status.className = "err"; status.textContent = "데이터 행이 없습니다."; return; }

  const header = rows[0].map(h => h.trim());
  const idx = {};
  BASE_FIELDS.forEach(h => { idx[h] = header.indexOf(h); });
  if (idx["주소"] < 0 || idx["휴게소명"] < 0) {
    status.className = "err";
    status.textContent = "헤더에 '휴게소명'과 '주소' 컬럼이 필요합니다. 샘플 양식을 사용하세요.";
    return;
  }

  // 기본 4개 컬럼을 뺀 나머지는 전부 사업자 컬럼. 새 사업자는 자동 등록.
  const opCols = header
    .map((h, i) => ({ op: h.trim(), i }))
    .filter(x => x.op && !BASE_FIELDS.includes(x.op));
  const newOps = [];
  opCols.forEach(x => { if (registerOperator(x.op)) newOps.push(x.op); });

  let ok = 0; const failed = [];
  const added = [];
  for (let r = 1; r < rows.length; r++) {
    const cells = rows[r];
    const name = (cells[idx["휴게소명"]] || "").trim();
    if (!name) continue;
    const address = (cells[idx["주소"]] || "").trim();
    const operators = {}; let total = 0;
    opCols.forEach(x => {
      const v = parseInt((cells[x.i] || "").trim(), 10);
      if (Number.isFinite(v) && v > 0) { operators[x.op] = v; total += v; }
    });
    if (total === 0) { failed.push(name + " (충전기 수 없음)"); continue; }

    status.textContent = `지오코딩 중… (${r}/${rows.length - 1}) ${name}`;
    const geo = await geocodeClient(name, address);
    if (!geo) { failed.push(name + " (좌표 변환 실패)"); continue; }

    const item = {
      no: null, name, type: (cells[idx["시설구분"]] || "").trim(),
      route: (cells[idx["노선명"]] || "").trim(), address,
      lat: geo.lat, lng: geo.lng, operators, total, approx: false, uploaded: true,
    };
    addItem(item);
    added.push(item);
    ok++;
  }

  updateCounts();
  refresh();
  if (added.length) {
    const b = new kakao.maps.LatLngBounds();
    added.forEach(d => b.extend(new kakao.maps.LatLng(d.lat, d.lng)));
    map.setBounds(b);
  }
  status.className = failed.length ? "err" : "";
  const newMsg = newOps.length ? `\n신규 사업자 ${newOps.length}개 추가: ${newOps.join(", ")}` : "";
  status.textContent = `추가 완료: ${ok}곳${newMsg}` + (failed.length ? `\n실패 ${failed.length}곳:\n- ${failed.join("\n- ")}` : "");
}

function init() {
  map = new kakao.maps.Map(document.getElementById("map"), {
    center: new kakao.maps.LatLng(36.3, 127.8),
    level: 13,
  });
  infowindow = new kakao.maps.InfoWindow({ removable: true, zIndex: 10 });

  DATA.forEach(addItem);

  buildFilters();
  buildCountFilters();
  wireSettings();
  document.getElementById("sample-dl").onclick = downloadSample;
  document.getElementById("csv-file").onchange = (e) => {
    const f = e.target.files[0];
    if (f) handleUpload(f);
    e.target.value = "";  // 같은 파일 재업로드 허용
  };
  document.getElementById("all-on").onclick = () => {
    document.querySelectorAll(".op").forEach(el => active.add(el.dataset.op));
    syncButtons(); refresh();
  };
  document.getElementById("all-off").onclick = () => {
    active.clear(); syncButtons(); refresh();
  };
  refresh();
}

(function loadSDK() {
  const s = document.createElement("script");
  s.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${JS_KEY}&libraries=services&autoload=false`;
  s.onload = () => kakao.maps.load(init);
  document.head.appendChild(s);
})();
</script>
